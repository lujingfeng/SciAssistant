<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>忘记密码</title>
    <!-- 引入Font Awesome图标库 -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- 引入Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 自定义渐变背景 */
        .bg-gradient-custom {
            background: linear-gradient(135deg, #5fb6df 10%, #0284C7 100%);
        }
        /* 输入框聚焦样式 */
        .form-input:focus {
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.3);
        }
        /* 按钮过渡效果 */
        .btn-primary {
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }
        /* 成功提示样式 */
        .success-message {
            color: #10b981; /* 绿色成功色 */
            font-size: 0.875rem;
            margin-top: 1rem;
            text-align: center;
            font-weight: 500;
        }
        .countdown-text {
            color: #3b82f6; /* 蓝色倒计时文本 */
            font-weight: 600;
        }
        /* 加载动画 */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }
        .loading-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gradient-custom min-h-screen flex items-center justify-center p-4">
    <!-- 加载动画覆盖层 -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="spinner"></div>
    </div>

    <!-- 主体卡片 -->
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden">
        <div class="p-8">
            <!-- 标题区域 -->
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-gray-800 mb-2">忘记密码</h1>
                <p class="text-gray-600">请输入您的用户名和邮箱以重置密码</p>
            </div>
            
            <!-- 忘记密码表单 -->
            <form id="forgotPasswordForm" class="space-y-6">
                <!-- 用户名输入框 -->
                <div>
                    <label for="username" class="block text-sm font-medium text-gray-700 mb-2">用户名</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fas fa-user text-gray-400"></i>
                        </div>
                        <input 
                            type="text" 
                            id="username" 
                            name="username" 
                            required 
                            class="form-input pl-10 w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition duration-300"
                            placeholder="请输入您的用户名"
                        >
                    </div>
                    <div id="usernameError" class="text-red-500 text-sm mt-1 hidden"></div>
                </div>

                <!-- 邮箱输入框 -->
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-2">邮箱地址</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fas fa-envelope text-gray-400"></i>
                        </div>
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            required 
                            class="form-input pl-10 w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition duration-300"
                            placeholder="请输入您的邮箱地址（如：xxx@xxx.com）"
                        >
                    </div>
                    <div id="emailError" class="text-red-500 text-sm mt-1 hidden"></div>
                </div>

                <!-- 密码重置区域（默认隐藏） -->
                <div id="passwordResetArea" class="space-y-6 hidden">
                    <!-- 新密码输入框 -->
                    <div>
                        <label for="newPassword" class="block text-sm font-medium text-gray-700 mb-2">新密码</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i class="fas fa-lock text-gray-400"></i>
                            </div>
                            <input 
                                type="password" 
                                id="newPassword" 
                                name="newPassword" 
                                class="form-input pl-10 w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition duration-300"
                                placeholder="请输入新密码（至少6位）"
                            >
                        </div>
                        <div id="newPasswordError" class="text-red-500 text-sm mt-1 hidden"></div>
                    </div>

                    <!-- 确认密码输入框 -->
                    <div>
                        <label for="confirmPassword" class="block text-sm font-medium text-gray-700 mb-2">确认新密码</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i class="fas fa-lock text-gray-400"></i>
                            </div>
                            <input 
                                type="password" 
                                id="confirmPassword" 
                                name="confirmPassword" 
                                class="form-input pl-10 w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition duration-300"
                                placeholder="请再次输入新密码"
                            >
                        </div>
                        <div id="confirmPasswordError" class="text-red-500 text-sm mt-1 hidden"></div>
                    </div>
                </div>
                
                <!-- 操作按钮 -->
                <button 
                    type="submit" 
                    id="submitBtn" 
                    class="btn-primary w-full bg-gradient-to-r from-cyan-500 to-blue-600 text-white py-3 px-4 rounded-lg font-semibold shadow-lg hover:from-cyan-600 hover:to-blue-700 transition duration-300"
                >
                    验证信息
                </button>
                
                <!-- 成功提示（默认隐藏） -->
                <div id="successMsg" class="success-message hidden">
                    <i class="fas fa-check-circle mr-1"></i> 密码重置成功！将在 <span class="countdown-text" id="countdown">3</span> 秒后自动返回登录页
                </div>
            </form>
            
            <!-- 返回登录链接 -->
            <div class="mt-6 text-center">
                <a href="login.html" class="text-blue-500 hover:text-blue-700 font-medium flex items-center justify-center">
                    <i class="fas fa-arrow-left mr-2"></i> 立即返回登录
                </a>
            </div>
        </div>
        
        <!-- 底部注册提示 -->
        <div class="bg-gray-50 px-8 py-6 text-center">
            <p class="text-gray-600 text-sm">
                没有账户？
                <a href="register.html" class="text-blue-500 hover:text-blue-700 font-medium">立即注册</a>
            </p>
        </div>
    </div>

    <script>
        // 获取DOM元素
        const forgotForm = document.getElementById('forgotPasswordForm');
        const usernameInput = document.getElementById('username');
        const emailInput = document.getElementById('email');
        const usernameError = document.getElementById('usernameError');
        const emailError = document.getElementById('emailError');
        const passwordResetArea = document.getElementById('passwordResetArea');
        const newPasswordInput = document.getElementById('newPassword');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const newPasswordError = document.getElementById('newPasswordError');
        const confirmPasswordError = document.getElementById('confirmPasswordError');
        const submitBtn = document.getElementById('submitBtn');
        const successMsg = document.getElementById('successMsg');
        const countdownEl = document.getElementById('countdown');
        const loadingOverlay = document.getElementById('loadingOverlay');
        let userId = null;
        let countdownTimer = null;

        // 表单提交事件
        forgotForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            // 清除定时器
            if (countdownTimer) clearInterval(countdownTimer);
            
            // 重置状态
            [usernameError, emailError, newPasswordError, confirmPasswordError].forEach(el => {
                el.classList.add('hidden');
            });
            [usernameInput, emailInput, newPasswordInput, confirmPasswordInput].forEach(el => {
                if (el) el.classList.remove('border-red-500');
            });
            successMsg.classList.add('hidden');

            // 第一阶段：验证用户名和邮箱
            if (!userId) {
                const username = usernameInput.value.trim();
                const email = emailInput.value.trim();
                let isInputValid = true;

                if (!username) {
                    showError(usernameError, usernameInput, '请输入用户名');
                    isInputValid = false;
                }
                if (!email) {
                    showError(emailError, emailInput, '请输入邮箱地址');
                    isInputValid = false;
                } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                    showError(emailError, emailInput, '请输入有效的邮箱地址');
                    isInputValid = false;
                }

                if (!isInputValid) return;

                // 显示加载状态
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<i class="fas fa-circle-notch fa-spin mr-2"></i> 验证中...';

                try {
                    // 调用验证接口
                    const response = await fetch('/5000/api/verify-credentials', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username, email })
                    });

                    const result = await response.json();
                    
                    if (result.success) {
                        userId = result.data.userId;
                        passwordResetArea.classList.remove('hidden');
                        submitBtn.textContent = '重置密码';
                        newPasswordInput.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    } else {
                        showError(emailError, emailInput, result.message);
                    }
                } catch (error) {
                    showError(emailError, emailInput, '网络错误，请稍后重试');
                    console.error('验证失败:', error);
                } finally {
                    submitBtn.disabled = false;
                    if (!userId) {
                        submitBtn.textContent = '验证信息';
                    }
                }
            } 
            // 第二阶段：重置密码并跳转登录
            else {
                const newPassword = newPasswordInput.value;
                const confirmPassword = confirmPasswordInput.value;
                let isInputValid = true;

                if (newPassword.length < 6) {
                    showError(newPasswordError, newPasswordInput, '新密码长度不能少于6位');
                    isInputValid = false;
                }
                if (newPassword !== confirmPassword) {
                    showError(confirmPasswordError, confirmPasswordInput, '两次输入的密码不一致');
                    isInputValid = false;
                }

                if (!isInputValid) return;

                // 显示加载状态
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<i class="fas fa-circle-notch fa-spin mr-2"></i> 处理中...';
                loadingOverlay.classList.add('active'); // 显示加载动画

                try {
                    // 调用重置密码接口
                    const response = await fetch('/5000/api/reset-password', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            userId,
                            newPassword,
                            confirmPassword
                        })
                    });

                    const result = await response.json();
                    
                    if (result.success) {
                        loadingOverlay.classList.remove('active'); // 隐藏加载动画
                        successMsg.classList.remove('hidden');
                        let countdown = 3;
                        countdownEl.textContent = countdown;

                        // 倒计时并跳转登录页
                        countdownTimer = setInterval(() => {
                            countdown--;
                            countdownEl.textContent = countdown;

                            if (countdown <= 0) {
                                clearInterval(countdownTimer);
                                // 跳转到登录界面（确保路径正确）
                                window.location.href = 'login.html';
                            }
                        }, 1000);
                    } else {
                        loadingOverlay.classList.remove('active');
                        showError(newPasswordError, newPasswordInput, result.message);
                    }
                } catch (error) {
                    loadingOverlay.classList.remove('active');
                    showError(newPasswordError, newPasswordInput, '网络错误，请稍后重试');
                    console.error('重置密码失败:', error);
                } finally {
                    submitBtn.disabled = false;
                }
            }
        });

        // 辅助函数：显示错误提示
        function showError(errorElement, inputElement, message) {
            errorElement.textContent = message;
            errorElement.classList.remove('hidden');
            inputElement.classList.add('border-red-500');
            inputElement.focus();
        }

        // 页面关闭时清除定时器
        window.addEventListener('beforeunload', function() {
            if (countdownTimer) clearInterval(countdownTimer);
        });
    </script>
</body>
</html>
